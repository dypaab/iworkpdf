<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Page not found — iWorkPDF</title>
<meta name="robots" content="noindex"/>
<link rel="icon" type="image/png" href="/logo_seul_sans_fond.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/shared.css?v20260721d"/>
<link rel="stylesheet" href="/tool-theme.css?v20260721d"/>
<style>
.err-page{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:32px;flex-direction:column;gap:24px}
.err-code{font-size:120px;font-weight:900;line-height:1;background:linear-gradient(135deg,#00B4D8,#0077FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-4px}
.err-title{font-size:28px;font-weight:700;color:var(--tx)}
.err-sub{font-size:16px;color:var(--tx2);max-width:400px;line-height:1.6}
.err-tools{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:8px}
.err-tool{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:10px 18px;font-size:13px;color:var(--tx2);text-decoration:none;transition:all .2s}
.err-tool:hover{border-color:#00B4D8;color:#00B4D8}
.err-home{background:linear-gradient(135deg,#00B4D8,#0077FF);color:#fff;border:none;padding:14px 32px;border-radius:10px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-block;transition:opacity .2s}
.err-home:hover{opacity:.85}
</style>
</head>
<body>
<div class="err-page">
  <div class="err-code">404</div>
  <div class="err-title">Page not found</div>
  <p class="err-sub">The page you're looking for doesn't exist or has been moved. Try one of our tools below.</p>
  <a href="/" class="err-home">← Back to iWorkPDF</a>
  <div class="err-tools">
    <a href="/tools/compress" class="err-tool">🗜 Compress</a>
    <a href="/tools/merge" class="err-tool">🔀 Merge</a>
    <a href="/tools/split" class="err-tool">✂️ Split</a>
    <a href="/tools/rotate" class="err-tool">🔄 Rotate</a>
    <a href="/tools/pdf2jpg" class="err-tool">🖼 PDF to JPG</a>
    <a href="/tools/sign" class="err-tool">✍️ Sign</a>
  </div>
</div>
</body>
</html>
