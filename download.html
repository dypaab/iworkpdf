<!DOCTYPE html>
<html lang="fr" class="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="robots" content="noindex,nofollow"/>
<title>Fichier partagé — iWorkPDF</title>
<link rel="icon" type="image/png" href="/logo_seul_sans_fond.png"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://*.supabase.io; img-src 'self' data:; object-src 'none'; base-uri 'self';"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#0D1117;--sf:#161B22;--sf2:#1C2230;--bd:#2A3140;--tx:#E6EDF3;--tx2:#9DA7B3;--tx3:#6B7686;--cy:#00B4D8;--gr:linear-gradient(135deg,#00B4D8,#0077FF)}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',system-ui,sans-serif;background:radial-gradient(1200px 600px at 50% -10%,#00B4D815,transparent),var(--bg);color:var(--tx);padding:24px}
  .brand{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:18px}
  .brand img{width:34px;height:34px}
  .brand b{font-size:20px}.brand b span{background:var(--gr);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .card{background:var(--sf);border:1px solid var(--bd);border-radius:18px;padding:30px 26px;max-width:420px;width:100%;text-align:center;box-shadow:0 20px 60px #00000060}
  .ficon{width:64px;height:64px;margin:0 auto 14px;border-radius:16px;background:var(--sf2);display:flex;align-items:center;justify-content:center}
  .fname{font-size:18px;font-weight:600;word-break:break-word;margin-bottom:4px}
  .fmeta{color:var(--tx2);font-size:13px;margin-bottom:22px}
  .btn{display:inline-block;width:100%;padding:15px;border:none;border-radius:12px;background:var(--gr);color:#fff;font-weight:600;font-size:16px;cursor:pointer;font-family:inherit;text-decoration:none}
  .btn[disabled]{opacity:.5;cursor:default}
  .note{color:var(--tx3);font-size:12px;margin-top:16px;line-height:1.6}
  .msg{min-height:20px;font-size:14px;margin-top:12px}.msg.err{color:#F87171}
  a.home{color:var(--cy);text-decoration:none;font-size:13px}
  .spin{display:inline-block;width:16px;height:16px;border:2px solid #ffffff55;border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-3px;margin-right:8px}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="brand"><img src="/logo_seul_sans_fond.png" alt="YENDYX"/><b>i<span>Work</span>PDF</b></div>
  <div id="state">
    <div class="ficon"><span class="spin"></span></div>
    <div class="fname" id="fname">Chargement…</div>
    <div class="fmeta" id="fmeta"></div>
    <button class="btn" id="dlBtn" disabled>Télécharger</button>
    <div class="msg" id="msg"></div>
    <div class="note" id="note"></div>
  </div>
  <p style="margin-top:18px"><a class="home" href="/">← iWorkPDF · outils PDF privés</a></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://iispzrdathkixcgriyrr.supabase.co';
const SUPABASE_KEY='sb_publishable_quzgA4pxNzzzqntQOF6WoQ_3ZnFB36C';
const $=id=>document.getElementById(id);
const params=new URLSearchParams(location.search);
const id=params.get('id')||'';

function fmtSize(b){b=b||0;return b>1048576?(b/1048576).toFixed(1)+' Mo':(b/1024).toFixed(0)+' Ko';}
function fmtExpiry(iso){const h=Math.max(0,Math.round((new Date(iso)-Date.now())/3600000));return h>0?('expire dans ~'+h+' h'):'expiré';}

async function load(){
  if(!id){ fail("Lien invalide."); return; }
  try{
    const r=await fetch(`${SUPABASE_URL}/functions/v1/shared-file`,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY},
      body:JSON.stringify({id})
    });
    const d=await r.json();
    if(!r.ok||d.error){
      if(r.status===410) return fail("Ce lien a expiré. Les fichiers sont supprimés automatiquement après 48h.");
      if(r.status===404) return fail("Fichier introuvable.");
      return fail("Impossible de charger ce fichier.");
    }
    $('state').querySelector('.ficon').innerHTML='📄';
    $('fname').textContent=d.filename||'document.pdf';
    $('fmeta').textContent=fmtSize(d.file_size)+' · '+fmtExpiry(d.expires_at);
    const btn=$('dlBtn'); btn.disabled=false;
    btn.addEventListener('click',()=>startDownload(d.url,d.filename));
    $('note').textContent="🔒 Fichier partagé de façon temporaire via iWorkPDF. Rien n'est stocké de façon permanente.";
  }catch(e){ fail("Erreur réseau."); }
}
async function startDownload(url,filename){
  const btn=$('dlBtn'); btn.disabled=true; btn.innerHTML='<span class="spin"></span>Téléchargement…';
  try{
    const resp=await fetch(url); if(!resp.ok) throw 0;
    const blob=await resp.blob();
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename||'document.pdf';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href),4000);
    btn.innerHTML='Télécharger'; btn.disabled=false;
  }catch(e){ btn.innerHTML='Télécharger'; btn.disabled=false; $('msg').className='msg err'; $('msg').textContent="Le téléchargement a échoué (lien peut-être expiré)."; }
}
function fail(m){
  $('state').querySelector('.ficon').innerHTML='⚠️';
  $('fname').textContent='Lien indisponible';
  $('fmeta').textContent='';
  const b=$('dlBtn'); b.style.display='none';
  $('msg').className='msg err'; $('msg').textContent=m;
}
load();
</script>
</body>
</html>
